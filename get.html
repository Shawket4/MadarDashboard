<!doctype html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <!-- Favicons: lead with a real .ico — Google Search's favicon crawler is
       unreliable with an SVG-only declaration. SVG is kept for crisp browser tabs,
       plus raster PNGs (multiples of 48px, per Google's guidelines). -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/Icon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <!-- Preload both logotypes so the EN⇄AR switch is instant (no fetch jitter). -->
  <link rel="preload" as="image" href="/madar.svg" type="image/svg+xml" />
  <link rel="preload" as="image" href="/madar_ar.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A2540" />

  <!-- Theme bootstrap: the marketing site DEFAULTS TO LIGHT (not the OS preference)
       on a first visit, and applies the resolved theme before paint to avoid a
       flash. A returning visitor's explicit choice (incl. dark/system) is honoured. -->
  <script>
    (function () {
      try {
        var k = "madar.theme", v = localStorage.getItem(k);
        if (v !== "light" && v !== "dark" && v !== "system") { v = "light"; localStorage.setItem(k, v); }
        var dark = v === "dark" || (v === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", dark);
        document.documentElement.style.colorScheme = dark ? "dark" : "light";
      } catch (e) {}
    })();
  </script>
